<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
        function getComputerChoice() {
            let computerChoice = Math.random();
            if (0 <= computerChoice <= 0.33) {
                console.log("Computer chose: rock");
                computerChoice = "rock";
            }
            else if (0.33 < computerChoice <= 0.66) {
                console.log("Computer chose: paper");
                computerChoice = "paper";
            }
            else {
                console.log("Computer chose: scissors");
                computerChoice = "scissors";
            }
            return computerChoice;
        }

        function getHumanChoice() {
            let userInput = prompt("Rock, paper or scissors? (rock, paper, scissors)").toLowerCase();
            console.log("you chose :" + userInput);
            return userInput;
        }

        function playRound(computerChoice, humanChoice) {
            if ((computerChoice === "rock" && humanChoice === "paper") || (computerChoice === "paper" && humanChoice === "scissors")
             || (computerChoice === "scissors" && humanChoice === "rock")) {
                console.log("you win !" + humanChoice + " beats " + computerChoice);
                humanScore++;
            }
            else if ((computerChoice === "paper" && humanChoice === "rock") || (computerChoice === "rock" && humanChoice === "scissors")
             || (computerChoice === "scissors" && humanChoice === "paper")) {
                console.log("you lost : " + computerChoice + " beats " + humanChoice);
                computerScore++;
            }
            else {
                console.log("it's a draw :')" + computerChoice + " " + humanChoice);
            }
        }

        function determineWinner() {
            if (humanScore > computerScore) {
                console.log("Congratulations! You Won!");
            }
            else if (humanScore < computerScore) {
                console.log("Sorry, you lost :')");
            }
            else {
                console.log("It's a draw");
            }
            console.log("Your Score: " + humanScore + " Computer's Score: " + computerScore);
        }

        function playGame() {
            for (let numberOfGamesPlayed = 0; numberOfGamesPlayed < 5; numberOfGamesPlayed++) {
                let humanChoice = getHumanChoice();
                let computerChoice = getComputerChoice();
                playRound(computerChoice, humanChoice);
            }
            determineWinner();
        }

        let humanScore = 0;
        let computerScore = 0;
        playGame()
        
        

        
    </script>
</body>
</html>
