<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
        function getComputerChoice() {
            if (0 <= humanChoice <= 0.33) {
                console.log("Computer chose: rock");
                humanChoice = "rock";
            }
            else if (0.33 < humanChoice <= 0.66) {
                console.log("Computer chose: paper");
                humanChoice = "paper";
            }
            else {
                console.log("Computer chose: scissors");
                humanChoice = "scissors";
            }
        }

        function getHumanChoice() {
            console.log("you chose :" + computerChoice);
        }

        let decideResult = function() {
            if ((humanChoice === "rock" && computerChoice === "paper") || (humanChoice === "paper" && computerChoice == "scissors") || (humanChoice === "scissors" && computerChoice === "rock")) {
                console.log("you win !");
            }
            else if ((humanChoice === "paper" && computerChoice === "rock") || (humanChoice === "rock" && computerChoice === "scissors") || (humanChoice === "scissors" && computerChoice === "paper")) {
                console.log("you lost");
            }
            else {
                console.log("it's a draw :')");
            }
        }

            let humanChoice = Math.random();
            let computerChoice = prompt("Rock, paper or scissors ? ");
            getHumanChoice(computerChoice);
            getComputerChoice(humanChoice);
            decideResult(humanChoice, computerChoice);

        
    </script>
</body>
</html>
